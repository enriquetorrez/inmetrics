title = "Full Repo INI Secrets Scan"

[extend]
useDefault = true

[[rules]]
id = "generic-ini-secrets"
description = "Detect generic secrets in ini files"
regex = '''(?i)(password|passwd|pwd|secret|token|apikey|api_key)\s*=\s*.+'''
keywords = ["password", "passwd", "secret", "token", "apikey", "api_key"]
entropy = 0.1
