name: gitleaks-full-scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          install-only: true

      - name: Verify Gitleaks
        run: gitleaks version

      - name: Scan entire repository
        run: |
              
          # Run full filesystem scan (not git diff)
          gitleaks detect \
            --source . \
            --no-git \
            --config .gitleaks.toml \
            --log-level info
